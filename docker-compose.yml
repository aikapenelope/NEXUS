# NEXUS AI Agent Platform — Docker Compose Stack
# Deploy on Hetzner CX43 (8 vCPU, 16GB RAM, 160GB disk)
#
# Services:
#   nexus-api      — FastAPI + Pydantic AI + AG-UI copilot endpoint
#   nexus-frontend — Next.js 15 + CopilotKit (OpenAI-style dark UI)
#   postgres       — PostgreSQL 17 + pgvector (data, mem0, RAG embeddings)
#   redis          — Redis 7 (caching, queues, agent state)
#   n8n            — Workflow automation (MCP hub)
#   playwright     — Headless browser automation (Playwright MCP server)
#   prefect        — Agent scheduling and orchestration
#
# Observability: Logfire Cloud (free tier, no self-hosted container needed)

services:
  # ── NEXUS API ────────────────────────────────────────────────────
  nexus-api:
    build: .
    container_name: nexus-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Provider SDKs read these directly
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      # App config (NEXUS_ prefix for pydantic-settings)
      - NEXUS_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEXUS_GROQ_API_KEY=${GROQ_API_KEY}
      - NEXUS_VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - NEXUS_DATABASE_URL=postgresql://nexus:nexus@postgres:5432/nexus
      - NEXUS_REDIS_URL=redis://redis:6379/0
      - NEXUS_DEBUG=false
      # Logfire observability (optional — noop if not set)
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-net

  # ── NEXUS Frontend ───────────────────────────────────────────────
  nexus-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_COPILOT_API_URL=/api/copilotkit
    depends_on:
      - nexus-api
    networks:
      - nexus-net

  # ── PostgreSQL + pgvector ────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: nexus-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-net

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-net

  # ── n8n (workflow automation / MCP hub) ──────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: nexus-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-nexus-n8n}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=nexus
      - DB_POSTGRESDB_USER=nexus
      - DB_POSTGRESDB_PASSWORD=nexus
      - DB_POSTGRESDB_SCHEMA=n8n
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-net

  # ── Playwright MCP (browser automation) ─────────────────────────
  playwright:
    image: mcr.microsoft.com/playwright:v1.54.0-noble
    container_name: nexus-playwright
    restart: unless-stopped
    ports:
      - "8931:8931"
    environment:
      - HEADLESS=true
      - MCP_PORT=8931
    working_dir: /app
    entrypoint:
      - sh
      - -c
      - |
        npm install -g @playwright/mcp@latest 2>/dev/null &&
        npx @playwright/mcp --headless --host 0.0.0.0 --port 8931 --no-sandbox --allowed-hosts '*'
    networks:
      - nexus-net

  # ── Prefect (agent scheduling) ──────────────────────────────────
  prefect:
    image: prefecthq/prefect:3-latest
    container_name: nexus-prefect
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      - PREFECT_SERVER_API_HOST=0.0.0.0
      - PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://nexus:nexus@postgres:5432/nexus
    command: prefect server start
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-net

volumes:
  postgres-data:
  redis-data:
  n8n-data:

networks:
  nexus-net:
    driver: bridge
