# NEXUS AI Agent Platform — Docker Compose Stack
# Deploy on Hetzner CX43 (8 vCPU, 16GB RAM, 160GB disk)
#
# Services:
#   nexus-api      — FastAPI + Pydantic AI + AG-UI copilot endpoint
#   nexus-frontend — Next.js 15 + CopilotKit (OpenAI-style dark UI)
#   postgres       — PostgreSQL 17 + pgvector (data, mem0, RAG embeddings)
#   redis          — Redis 7 (caching, queues, agent state)
#   playwright     — Headless browser automation (Playwright MCP server)
#   prefect        — Agent scheduling and orchestration
#
# Observability: Logfire Cloud (free tier, no self-hosted container needed)

# ── Shared log rotation config ──────────────────────────────────────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── NEXUS API ────────────────────────────────────────────────────
  nexus-api:
    build: .
    container_name: nexus-api
    restart: unless-stopped
    mem_limit: 4g
    cpus: 4
    ports:
      - "8000:8000"
    volumes:
      # Docker socket for deep agent sandbox containers.
      # Allows nexus-api to create isolated Docker containers for code execution.
      # The DOCKER_GID env var should match the docker group GID on the host.
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-999}"
    environment:
      # Provider SDKs read these directly
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      # App config (NEXUS_ prefix for pydantic-settings)
      - NEXUS_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEXUS_GROQ_API_KEY=${GROQ_API_KEY}
      - NEXUS_VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - NEXUS_DATABASE_URL=postgresql://nexus:nexus@postgres:5432/nexus
      - NEXUS_REDIS_URL=redis://redis:6379/0
      - NEXUS_DEBUG=false
      # Logfire observability (optional — noop if not set)
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN:-}
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-net

  # ── NEXUS Frontend ───────────────────────────────────────────────
  nexus-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus-frontend
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_COPILOT_API_URL=/api/copilotkit
    logging: *default-logging
    depends_on:
      - nexus-api
    networks:
      - nexus-net

  # ── PostgreSQL + pgvector ────────────────────────────────────────
  # Connection pooling note: PgBouncer not needed yet.
  # 4 gunicorn workers x 2 asyncpg pools (registry + traces) x max_size=5 = 40 conns.
  # Plus mem0 (~1), prefect (~5) = ~46 total. PG default max_connections=100.
  # Revisit if workers increase or new services are added.
  postgres:
    image: pgvector/pgvector:pg17
    container_name: nexus-postgres
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-net

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-net

  # ── Playwright MCP (browser automation) ─────────────────────────
  # Official mcp/playwright image (1.43GB vs 3.63GB for full Playwright).
  # Includes Chromium + MCP server. Entrypoint: node cli.js --headless.
  playwright:
    image: mcp/playwright:latest
    container_name: nexus-playwright
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1
    ports:
      - "8931:8931"
    command: ["--port", "8931", "--host", "0.0.0.0"]
    logging: *default-logging
    networks:
      - nexus-net

  # ── Prefect (agent scheduling) ──────────────────────────────────
  prefect:
    image: prefecthq/prefect:3-latest
    container_name: nexus-prefect
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    ports:
      - "127.0.0.1:4200:4200"
    environment:
      - PREFECT_SERVER_API_HOST=0.0.0.0
      - PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://nexus:nexus@postgres:5432/nexus
    command: prefect server start
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-net

  # ── Phoenix (AI observability & evaluation) ──────────────────────
  # Open-source AI observability: tracing, evals, prompt management,
  # playground, datasets, experiments.  Complements Logfire (infra).
  # UI at http://<host>:6006
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: nexus-phoenix
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1
    ports:
      - "6006:6006"
    environment:
      - PHOENIX_SQL_DATABASE_URL=postgresql://nexus:nexus@postgres:5432/phoenix
      - PHOENIX_WORKING_DIR=/data
    volumes:
      - phoenix-data:/data
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-net

  # ── Graphiti (temporal knowledge graph + MCP server) ──────────────
  # FalkorDB + Graphiti MCP in a single container.
  # Provides temporal knowledge graph memory for agents via MCP protocol.
  # MCP endpoint: http://graphiti:8000/mcp/
  # FalkorDB (Redis protocol): localhost:6380
  graphiti:
    image: zepai/knowledge-graph-mcp:latest
    container_name: nexus-graphiti
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1
    ports:
      - "127.0.0.1:8001:8000"
      - "127.0.0.1:6380:6379"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GRAPHITI_GROUP_ID=nexus
      - GRAPHITI_TELEMETRY_ENABLED=false
    volumes:
      - graphiti-data:/data
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - nexus-net

volumes:
  postgres-data:
  redis-data:
  phoenix-data:
  graphiti-data:

networks:
  nexus-net:
    driver: bridge
